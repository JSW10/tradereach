<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1200"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0A0A0A;
    font-family: 'Outfit', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Grain texture */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
    background-size: 256px;
    pointer-events: none;
    z-index: 10;
  }

  /* Radial glow blobs */
  .blob1 {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,78,0,0.28) 0%, transparent 70%);
    top: -180px; left: -100px;
    pointer-events: none;
  }
  .blob2 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,78,0,0.14) 0%, transparent 70%);
    bottom: -100px; right: 50px;
    pointer-events: none;
  }
  .blob3 {
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,120,0,0.10) 0%, transparent 70%);
    top: 50%; right: 200px;
    transform: translateY(-50%);
    pointer-events: none;
  }

  /* Grid lines */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 0 90px;
    width: 100%;
  }

  /* Logo mark */
  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 52px;
  }
  .logo-icon {
    width: 52px; height: 52px;
    background: #FF4E00;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(255,78,0,0.5);
  }
  .logo-text {
    font-size: 2rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .logo-text span { color: #FF4E00; }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,78,0,0.12);
    border: 1px solid rgba(255,78,0,0.35);
    border-radius: 100px;
    padding: 7px 18px;
    color: #FF7A3D;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #FF4E00;
  }

  /* Headline */
  h1 {
    font-size: 4.5rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.04em;
    line-height: 1.05;
    margin-bottom: 28px;
    max-width: 750px;
  }
  h1 span {
    color: #FF4E00;
  }

  /* Subline */
  p {
    font-size: 1.35rem;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
    max-width: 620px;
  }

  /* Domain pill */
  .domain {
    position: absolute;
    bottom: 48px;
    right: 90px;
    font-size: 1.05rem;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.02em;
    z-index: 20;
  }

  /* Right decorative element */
  .deco {
    position: absolute;
    right: 90px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 15;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .deco-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 14px;
    padding: 18px 24px;
    width: 240px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .deco-card-icon {
    width: 38px; height: 38px;
    background: rgba(255,78,0,0.15);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .deco-card-label {
    font-size: 0.9rem;
    font-weight: 600;
    color: rgba(255,255,255,0.75);
    line-height: 1.3;
  }
  .deco-card-sub {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.32);
    margin-top: 2px;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="blob1"></div>
  <div class="blob2"></div>
  <div class="blob3"></div>
  <div class="grid"></div>

  <div class="content">
    <div class="logo-row">
      <div class="logo-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="white" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-text">Trade<span>Reach</span></div>
    </div>

    <div class="badge">
      <div class="badge-dot"></div>
      Done-For-You Marketing
    </div>

    <h1>More Leads.<br><span>Zero</span> Marketing Effort.</h1>
    <p>SEO blogs, social media &amp; Google Business Profile — handled every month, so you can focus on the work.</p>
  </div>

  <!-- Right side cards -->
  <div class="deco">
    <div class="deco-card">
      <div class="deco-card-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF4E00" stroke-width="2" stroke-linecap="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div>
        <div class="deco-card-label">WhatsApp Update</div>
        <div class="deco-card-sub">2 min from you</div>
      </div>
    </div>
    <div class="deco-card">
      <div class="deco-card-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF4E00" stroke-width="2" stroke-linecap="round">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </div>
      <div>
        <div class="deco-card-label">Blog Post Published</div>
        <div class="deco-card-sub">SEO-optimised</div>
      </div>
    </div>
    <div class="deco-card">
      <div class="deco-card-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF4E00" stroke-width="2" stroke-linecap="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      <div>
        <div class="deco-card-label">Google Ranking ↑</div>
        <div class="deco-card-sub">More organic leads</div>
      </div>
    </div>
  </div>

  <div class="domain">tradereach.io</div>
</body>
</html>
